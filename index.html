<!DOCTYPE html>
<html>
  <head>
    <title>JavaScript Number Guessing Game</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="container">
      <p id="date"></p>
      <p id="time"></p>

      <h3>Level</h3>
      <div class="level-group">
        <input type="radio" name="level" id="e" value="3" checked><label for="e">Easy</label>
        <input type="radio" name="level" id="m" value="10"><label for="m">Medium</label>
        <input type="radio" name="level" id="h" value="100"><label for="h">Hard</label>
      </div>

      <button id="playBtn">Play</button>

      <h3 id="msg">Select a Level</h3>
      <p id="hotCold"></p>

      <div class="guess-row">
        <input type="text" id="guess">
        <button id="guessBtn" disabled>Guess</button>
        <button id="giveUpBtn" disabled>Give Up</button>
      </div>

      <h3>Stats</h3>
      <div class="stats-grid">
        <div class="stat-card"><p id="wins">Total wins <span>0</span></p></div>
        <div class="stat-card"><p id="losses">Losses <span>0</span></p></div>
        <div class="stat-card"><p id="avgScore">Avg score <span>—</span></p></div>
        <div class="stat-card"><p id="fastest">Fastest <span>—</span></p></div>
        <div class="stat-card"><p id="avgTime">Avg time <span>—</span></p></div>
      </div>

      <h3>Leaderboard</h3>
      <ol>
        <li name="leaderboard">—</li>
        <li name="leaderboard">—</li>
        <li name="leaderboard">—</li>
      </ol>
    </div>
  </body>
</html>
